global:
  scrape_interval: 10s
  evaluation_interval: 10s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
  - job_name: aiqa-gui-runtime
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 5s
  - job_name: langsmith-bridge
    metrics_path: /health
    static_configs:
      - targets: ['langsmith-bridge:3003']
